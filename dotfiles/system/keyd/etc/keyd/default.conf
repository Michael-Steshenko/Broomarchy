[ids]
*

[main]
# Tap Caps Lock for Escape, hold to activate the 'hyper' layer
capslock = overload(hyper, esc)

# Define the 'hyper' layer. 
# M is Meta (Super) and S is Shift.
[hyper:A-S]

# Note: If you eventually want the "hyper" layer to mimic the exact 
# 4-modifier combo often used in standard macOS Karabiner setups 
# (Cmd+Ctrl+Opt+Shift), you would change the above line to: [hyper:C-A-M-S]
